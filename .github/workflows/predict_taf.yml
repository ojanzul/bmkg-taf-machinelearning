name: Auto-Forecaster TAF Inference

on:
  schedule:
    - cron: '*/30 * * * *'  # Berjalan otomatis setiap 30 menit
  workflow_dispatch:       # Menyediakan tombol 'Run workflow' manual

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Inference & Predict TAF
        env:
          BMKG_API_TOKEN: ${{ secrets.BMKG_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python predict_taf.py

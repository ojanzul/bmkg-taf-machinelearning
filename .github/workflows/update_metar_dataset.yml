name: Update METAR WALS dataset

# API resmi BMKG cuma kasih 2 observasi TERKINI (bukan rentang historis),
# jadi jadwal harus sering -- tiap 30 menit, mengikuti interval terbit
# METAR reguler -- supaya tidak ada jam yang terlewat & hilang permanen.
# Bisa dipicu manual juga lewat tab "Actions" di GitHub.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# Supaya job bisa commit balik ke repo
permissions:
  contents: write

jobs:
  update-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Jalankan pipeline (fetch API -> parse -> label -> upsert Supabase)
        env:
          BMKG_API_TOKEN: ${{ secrets.BMKG_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python run_pipeline.py

      - name: Commit & push perubahan data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dataset METAR WALS otomatis"
          # Arsip sudah dimigrasi dari .txt ke .csv (lihat perbaikan bug
          # tanggal) -- pattern .txt dihapus karena file itu tidak pernah
          # ada lagi, dan git-auto-commit-action gagal (exit 128) kalau
          # sebuah pattern di file_pattern tidak match apa pun sama sekali.
          file_pattern: "data/*.csv"
